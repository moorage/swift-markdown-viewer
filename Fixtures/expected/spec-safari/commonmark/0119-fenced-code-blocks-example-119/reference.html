<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Safari Reference</title>
  <style>
    :root {
      color-scheme: light;
      font-synthesis-weight: none;
    }
    html {
      background: #ffffff;
    }
    body {
      margin: 0;
      padding: 28px 32px 48px;
      color: #1f2328;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      font-size: 17px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      word-wrap: break-word;
    }
    main {
      max-width: 820px;
    }
    p, ul, ol, pre, table, blockquote {
      margin: 0 0 16px;
    }
    h1, h2, h3, h4, h5, h6 {
      margin: 28px 0 12px;
      line-height: 1.25;
      font-weight: 700;
    }
    h1 { font-size: 2em; }
    h2 { font-size: 1.5em; }
    h3 { font-size: 1.25em; }
    code, pre {
      font-family: "SF Mono", SFMono-Regular, ui-monospace, monospace;
      font-size: 0.92em;
    }
    pre {
      padding: 14px 16px;
      border-radius: 10px;
      background: #f6f8fa;
      overflow: auto;
    }
    code {
      padding: 0.12em 0.32em;
      border-radius: 6px;
      background: rgba(175, 184, 193, 0.2);
    }
    pre code {
      padding: 0;
      background: transparent;
    }
    blockquote {
      padding-left: 14px;
      border-left: 4px solid #d0d7de;
      color: #57606a;
    }
    table {
      border-collapse: collapse;
    }
    th, td {
      padding: 6px 12px;
      border: 1px solid #d0d7de;
      text-align: left;
    }
    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <main>
<pre><code>&lt;
 &gt;
</code></pre>

  </main>
</body>
</html>
